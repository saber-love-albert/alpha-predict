<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlphaPredict 智股預測家</title>
    <!-- 載入最穩定的 Tailwind CSS 3.x CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 18 & Babel 轉譯器 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Chart.js 動態圖表 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            background-color: #0b0f19;
        }
        /* 優化手機端滾動條 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 9999px;
        }
    </style>
</head>
<body class="text-slate-100 font-sans min-h-screen antialiased select-none pb-12">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [symbol, setSymbol] = useState('');
            const [apiKey, setApiKey] = useState('');
            const [showKeyInput, setShowKeyInput] = useState(true);
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [error, setError] = useState('');
            const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
            
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // 網頁載入時自動讀取本地儲存的 API Key
            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) {
                    setApiKey(savedKey);
                    setShowKeyInput(false);
                }
            }, []);

            // 自訂彈出訊息
            const triggerToast = (message, type = 'info') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
            };

            // 儲存金鑰到手機本地空間
            const handleSaveApiKey = (e) => {
                e.preventDefault();
                if (!apiKey.trim()) {
                    triggerToast('請輸入有效的 Gemini API Key', 'error');
                    return;
                }
                localStorage.setItem('gemini_api_key', apiKey.trim());
                setShowKeyInput(false);
                triggerToast('金鑰已安全儲存！', 'success');
            };

            // 清除本地儲存的金鑰
            const handleClearApiKey = () => {
                localStorage.removeItem('gemini_api_key');
                setApiKey('');
                setShowKeyInput(true);
                triggerToast('金鑰已安全清除', 'info');
            };

            // 繪製股票趨勢圖
            useEffect(() => {
                if (data && data.historicalPrices && chartRef.current) {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                    const ctx = chartRef.current.getContext('2d');
                    
                    const sortedPrices = [...data.historicalPrices].sort((a, b) => new Date(a.date) - new Date(b.date));

                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: sortedPrices.map(d => d.date.slice(5)), // 只秀 月-日
                            datasets: [{
                                data: sortedPrices.map(d => d.price),
                                borderColor: '#38bdf8',
                                backgroundColor: 'rgba(56, 189, 248, 0.04)',
                                borderWidth: 2,
                                tension: 0.3,
                                pointRadius: 4,
                                pointHoverRadius: 6,
                                pointBackgroundColor: '#38bdf8',
                                pointBorderColor: '#0b0f19',
                                pointBorderWidth: 1.5,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false }
                            },
                            scales: {
                                x: {
                                    grid: { display: false },
                                    ticks: { color: '#64748b', font: { size: 10 } }
                                },
                                y: {
                                    grid: { color: '#1e293b' },
                                    ticks: { color: '#64748b', font: { size: 10 } }
                                }
                            }
                        }
                    });
                }
            }, [data]);

            // 智慧過濾 JSON 提取器 (動態組合避免中斷系統解析器)
            const cleanAndExtractJson = (text) => {
                let temp = text.trim();
                
                const backtick = '`';
                const threeTicks = backtick + backtick + backtick;
                const startTag = threeTicks + 'json';
                const endTag = threeTicks;

                // 優先解析 markdown json 區塊
                let startIdx = temp.indexOf(startTag);
                if (startIdx !== -1) {
                    let endIdx = temp.indexOf(endTag, startIdx + startTag.length);
                    if (endIdx !== -1) {
                        return temp.substring(startIdx + startTag.length, endIdx).trim();
                    }
                }

                // 備用解析法：尋找第一個 { 與最後一個 } 的區間
                const firstBrace = temp.indexOf('{');
                const lastBrace = temp.lastIndexOf('}');
                if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
                    return temp.substring(firstBrace, lastBrace + 1).trim();
                }

                return temp;
            };

            // 預測處理 (含 5 次指數型退避重試)
            const handlePredict = async (e) => {
                e.preventDefault();
                if (!apiKey.trim()) {
                    triggerToast('請先設定您的 Gemini API Key！', 'error');
                    setShowKeyInput(true);
                    return;
                }
                if (!symbol.trim()) {
                    triggerToast('請輸入股票或 ETF 代號！', 'error');
                    return;
                }

                setLoading(true);
                setError('');
                setData(null);

                // 提示詞不包含任何 ``` 符號避免解析錯誤
                const prompt = `
                  你是一位精通全球股市與量化交易的首席分析師。請針對金融標的「${symbol.toUpperCase()}」進行下一交易日的漲跌幅走勢預測。
                  
                  請利用你的 Google 搜尋功能 (Google Search Grounding)，在網路上實時檢索並彙整以下資訊：
                  1. 該標的今天的最新收盤價/現價。
                  2. 該標的最近 7 至 10 個交易日的歷史收盤價序列（格式為 YYYY-MM-DD，請找出對應的真實價格，用來繪製圖表）。
                  3. 最新 24 小時內與該標的相關新聞、產業趨勢、總體經濟動向、重大財報消息。

                  請結合搜尋到的「歷史趨勢（技術面）」與「最新利多/利空消息（基本面）」，進行多空機率運算。

                  請絕對只返回一個標準的 JSON 格式內容（可以直接用 markdown json 格式包裝），除此之外不要有任何前後說明引言。
                  JSON 結構必須完全符合以下欄位設定，且其中的 historicalPrices 請務必填入你搜尋到的真實歷史價格：
                  {
                    "symbol": "${symbol.toUpperCase()}",
                    "currentPrice": 最新價格(數字),
                    "prediction": "漲" 或 "跌" 或 "盤整",
                    "upProbability": 漲的機率百分比(整數，例如 65),
                    "downProbability": 跌的機率百分比(整數，例如 35),
                    "targetRange": "預測隔日波動區間，例如 152.0 ~ 155.5",
                    "historicalPrices": [
                      {"date": "2026-05-20", "price": 150.2},
                      {"date": "2026-05-21", "price": 151.0}
                    ],
                    "analysis": "結合技術面（歷史趨勢）與今日網路最新消息（基本面）的綜合分析報告（繁體中文，約 200 字）。"
                  }
                `;

                const retryDelays = [1000, 2000, 4000, 8000, 16000];
                const executeWithRetry = async (url, options, attempt = 0) => {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) {
                            if (attempt < retryDelays.length) {
                                await new Promise(resolve => setTimeout(resolve, retryDelays[attempt]));
                                return executeWithRetry(url, options, attempt + 1);
                            }
                            const errData = await response.json().catch(() => ({}));
                            throw new Error(errData.error?.message || `API 響應錯誤: ${response.status}`);
                        }
                        return await response.json();
                    } catch (err) {
                        if (attempt < retryDelays.length) {
                            await new Promise(resolve => setTimeout(resolve, retryDelays[attempt]));
                            return executeWithRetry(url, options, attempt + 1);
                        }
                        throw err;
                    }
                };

                try {
                    // 使用正式聯網穩定版
                    const apiEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey.trim()}`;
                    
                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        tools: [{ google_search: {} }] // 開啟 Google Grounding 聯網搜尋大腦
                    };

                    const result = await executeWithRetry(apiEndpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) {
                        throw new Error('AI 未能成功返回預測結果，請再試一次。');
                    }

                    const cleanedJsonString = cleanAndExtractJson(rawText);
                    const parsedResult = JSON.parse(cleanedJsonString);
                    
                    setData(parsedResult);
                    triggerToast('預測報告生成完畢！', 'success');

                } catch (err) {
                    console.error('預測失敗:', err);
                    setError(err.message || '連線至 Gemini API 失敗，請確認您的金鑰與網路。');
                    triggerToast('預測處理中斷', 'error');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div class="max-w-md mx-auto p-4 space-y-5">
                    {/* Header */}
                    <header class="text-center my-4 space-y-1.5">
                        <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-sky-500/10 text-sky-400 text-2xl mb-1 shadow-inner">
                            🔮
                        </div>
                        <h1 class="text-xl font-bold tracking-wide bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">
                            AlphaPredict 智股預測家
                        </h1>
                        <p class="text-[10px] text-slate-500 tracking-wider uppercase font-medium">Serverless Client-Side AI Predictor</p>
                    </header>

                    {/* API Key 狀態設定卡 */}
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-xl">
                        <div class="flex justify-between items-center">
                            <h2 class="text-xs font-bold text-slate-400 flex items-center gap-1.5">
                                <span class="text-sky-400">🔑</span> Gemini API 金鑰設定
                            </h2>
                            {!showKeyInput && (
                                <button 
                                    onClick={() => setShowKeyInput(true)} 
                                    class="text-[10px] text-sky-400 hover:text-sky-300 font-medium cursor-pointer"
                                >
                                    修改金鑰
                                </button>
                            )}
                        </div>

                        {showKeyInput ? (
                            <form onSubmit={handleSaveApiKey} class="mt-3 flex gap-2">
                                <input 
                                    type="password" 
                                    placeholder="輸入 AIzaSy... 開頭的 API Key" 
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                    class="flex-1 bg-slate-950 border border-slate-800/80 rounded-xl px-3.5 py-2.5 text-xs text-slate-200 focus:outline-none focus:border-sky-500 placeholder-slate-700 transition-all font-mono"
                                />
                                <button 
                                    type="submit" 
                                    class="bg-sky-500 hover:bg-sky-600 text-white font-semibold px-4 py-2.5 rounded-xl text-xs transition-all cursor-pointer active:scale-95"
                                >
                                    儲存
                                </button>
                            </form>
                        ) : (
                            <div class="mt-3 flex justify-between items-center bg-slate-950/60 border border-slate-800 rounded-xl px-3.5 py-2.5 text-xs">
                                <span class="font-mono text-slate-500 font-medium">已安全儲存金鑰 (••••••••••••)</span>
                                <button 
                                    type="button" 
                                    onClick={handleClearApiKey}
                                    class="text-[10px] text-red-400 hover:text-red-300 font-medium cursor-pointer"
                                >
                                    清除
                                </button>
                            </div>
                        )}
                    </div>

                    {/* 輸入與查詢區塊 */}
                    <form onSubmit={handlePredict} class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-xl space-y-3">
                        <label class="block text-[11px] font-bold text-slate-400">輸入全球股票或 ETF 代號</label>
                        <div class="flex gap-2">
                            <input 
                                type="text" 
                                placeholder="台股如: 2330.TW | 美股: NVDA | ETF: 00830.TW" 
                                value={symbol}
                                onChange={(e) => setSymbol(e.target.value)}
                                class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs focus:outline-none focus:border-sky-500 uppercase placeholder-slate-700 font-semibold text-slate-200"
                            />
                            <button 
                                type="submit" 
                                disabled={loading}
                                class="bg-gradient-to-r from-sky-500 to-indigo-600 hover:from-sky-600 hover:to-indigo-700 disabled:from-slate-800 disabled:to-slate-800 disabled:text-slate-500 text-white font-bold px-5 py-3 rounded-xl text-xs transition-all shadow-md active:scale-95 flex items-center justify-center gap-1.5 cursor-pointer"
                            >
                                {loading ? (
                                    <span class="inline-block animate-spin rounded-full h-3.5 w-3.5 border-2 border-slate-400 border-t-white"></span>
                                ) : '🔮 預測'}
                            </button>
                        </div>
                    </form>

                    {/* 錯誤資訊 */}
                    {error && (
                        <div class="bg-rose-500/10 border border-rose-500/20 text-rose-400 p-4 rounded-xl text-xs leading-relaxed">
                            ⚠️ {error}
                        </div>
                    )}

                    {/* 預測結果展示 */}
                    {data && (
                        <div class="space-y-4">
                            {/* 預報主看板 */}
                            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl space-y-4">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h2 class="text-2xl font-black text-white tracking-tight">{data.symbol}</h2>
                                        <p class="text-xs text-slate-400 mt-0.5">最新收盤價: <span class="font-mono font-semibold text-slate-200">${data.currentPrice}</span></p>
                                    </div>
                                    <div class={`text-xs font-black px-3.5 py-1.5 rounded-full ${
                                        data.prediction === '漲' ? 'bg-emerald-500/15 text-emerald-400 border border-emerald-500/20' :
                                        data.prediction === '跌' ? 'bg-rose-500/15 text-rose-400 border border-rose-500/20' :
                                        'bg-amber-500/15 text-amber-400 border border-amber-500/20'
                                    }`}>
                                        隔日走勢：{data.prediction}
                                    </div>
                                </div>

                                {/* 多空機率條 */}
                                <div class="space-y-2 pt-2 border-t border-slate-800/50">
                                    <div class="flex justify-between text-[11px] font-bold">
                                        <span class="text-emerald-400 flex items-center gap-1">🟢 漲的機率 {data.upProbability}%</span>
                                        <span class="text-rose-400 flex items-center gap-1">🔴 跌的機率 {data.downProbability}%</span>
                                    </div>
                                    <div class="w-full bg-slate-950 h-3 rounded-full flex overflow-hidden p-[2px] border border-slate-800/40">
                                        <div style={{width: `${data.upProbability}%`}} class="bg-emerald-500 rounded-l-full transition-all duration-500"></div>
                                        <div style={{width: `${data.downProbability}%`}} class="bg-rose-500 rounded-r-full transition-all duration-500"></div>
                                    </div>
                                </div>

                                {/* 波動區間 */}
                                <div class="bg-slate-950/80 p-3 rounded-xl border border-slate-850 flex justify-between items-center">
                                    <span class="text-[11px] text-slate-400 font-medium">波動預測區間</span>
                                    <span class="font-mono text-xs text-sky-300 font-bold">{data.targetRange}</span>
                                </div>
                            </div>

                            {/* 技術面：K 線趨勢圖 */}
                            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-4 shadow-xl space-y-3">
                                <h3 class="text-xs font-bold text-slate-400 flex items-center gap-1.5">
                                    <span>📈</span> 聯網檢索歷史收盤價
                                </h3>
                                <div class="h-44">
                                    <canvas ref={chartRef}></canvas>
                                </div>
                            </div>

                            {/* 基本面：AI 量化分析報告 */}
                            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl space-y-3">
                                <h3 class="text-xs font-bold text-sky-400 flex items-center gap-1.5">
                                    <span>📋</span> 聯網綜合量化報告
                                </h3>
                                <p class="text-xs text-slate-300 leading-relaxed text-justify">
                                    {data.analysis}
                                </p>
                            </div>
                        </div>
                    )}

                    {/* 骨架載入動畫 */}
                    {loading && (
                        <div class="animate-pulse space-y-4">
                            <div class="bg-slate-900 border border-slate-800 h-40 rounded-3xl"></div>
                            <div class="bg-slate-900 border border-slate-800 h-44 rounded-3xl"></div>
                        </div>
                    )}

                    {/* 自訂彈出提示訊息 */}
                    {toast.show && (
                        <div class={`fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-3 rounded-xl shadow-2xl text-xs font-medium z-50 flex items-center gap-1.5 border transition-all duration-300 ${
                            toast.type === 'success' ? 'bg-emerald-950/90 text-emerald-300 border-emerald-500/20' :
                            toast.type === 'error' ? 'bg-rose-950/90 text-rose-300 border-rose-500/20' :
                            'bg-slate-900/95 text-slate-300 border-slate-700/50'
                        }`}>
                            <span>{toast.type === 'success' ? '✅' : toast.type === 'error' ? '⚠️' : 'ℹ️'}</span>
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
