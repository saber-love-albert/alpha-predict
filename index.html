<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlphaPredict 智股預測家</title>
    <!-- 載入最穩定的 Tailwind CSS 3.x CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 18 & Babel 轉譯器 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Chart.js 動態圖表 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- 載入免手動構建的 Firebase 相容版 SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            background-color: #030712;
        }
        /* 優化手機滾動 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 9999px;
        }
        /* 拖曳中樣式 */
        .dragging {
            opacity: 0.5;
            background-color: #1e293b !important;
        }
    </style>
</head>
<body class="text-slate-100 font-sans min-h-screen antialiased select-none pb-24">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 🏷️ 在地化高精準中英文名稱字典 (解決 00830、COST等顯示問題)
        // ==========================================
        const STOCK_DICTIONARY = {
            // 台灣熱門 ETF 與個股
            '00830': '國泰費城半導體',
            '00830.TW': '國泰費城半導體',
            '2330.TW': 'TSMC 台積電',
            '2330': 'TSMC 台積電',
            '0050.TW': '元大台灣50',
            '0050': '元大台灣50',
            '0056.TW': '元大高股息',
            '0056': '元大高股息',
            '00878.TW': '國泰永續高股息',
            '00878': '國泰永續高股息',
            '00919.TW': '群益台灣精選高息',
            '00919': '群益台灣精選高息',
            '00929.TW': '復華台灣科技優息',
            '00929': '復華台灣科技優息',
            '00940.TW': '元大台灣價值高息',
            '00940': '元大台灣價值高息',
            '2317.TW': 'Foxconn 鴻海',
            '2317': 'Foxconn 鴻海',
            '2454.TW': 'MediaTek 聯發科',
            '2454': 'MediaTek 聯發科',

            // 美股熱門個股
            'MSFT': 'Microsoft 微軟',
            'NVDA': 'NVIDIA 輝達',
            'AAPL': 'Apple 蘋果',
            'TSLA': 'Tesla 特斯拉',
            'COST': 'Costco 好市多',
            'WMT': 'Walmart 沃爾瑪',
            'PG': 'Procter & Gamble 寶僑',
            'KO': 'Coca-Cola 可口可樂',
            'AMZN': 'Amazon 亞馬遜',
            'GOOGL': 'Alphabet 谷歌',
            'GOOG': 'Alphabet 谷歌',
            'META': 'Meta 臉書',
            'NFLX': 'Netflix 網飛',
            'AMD': 'AMD 超微',
            'INTC': 'Intel 英特爾'
        };

        // 預設觀察股票清單
        const DEFAULT_WATCHLIST = [
            { symbol: 'MSFT', name: 'Microsoft 微軟', isFavorite: true, predictionHistory: {}, latestData: null },
            { symbol: '2330.TW', name: 'TSMC 台積電', isFavorite: true, predictionHistory: {}, latestData: null },
            { symbol: 'NVDA', name: 'NVIDIA 輝達', isFavorite: true, predictionHistory: {}, latestData: null },
            { symbol: '00830', name: '國泰費城半導體', isFavorite: false, predictionHistory: {}, latestData: null }
        ];

        // ==========================================
        // 🔮 1. 智慧初始化雲端資料庫
        // ==========================================
        let db = null;
        let auth = null;
        let useFirebase = false;
        let appId = 'alpha-predict';

        try {
            if (typeof firebase !== 'undefined' && typeof __firebase_config !== 'undefined' && __firebase_config) {
                const firebaseConfig = JSON.parse(__firebase_config);
                if (firebaseConfig && firebaseConfig.apiKey) {
                    firebase.initializeApp(firebaseConfig);
                    db = firebase.firestore();
                    auth = firebase.auth();
                    useFirebase = true;
                }
            }
        } catch (e) {
            console.warn("[環境防爆] 自動降級為本地資料持久化模式:", e);
        }

        if (typeof __app_id !== 'undefined' && __app_id) {
            appId = __app_id;
        }

        function App() {
            // 雲端與帳戶相關 State
            const [user, setUser] = useState(null);
            const [cloudSyncing, setCloudSyncing] = useState(true);

            // 核心功能 State
            const [watchlist, setWatchlist] = useState([]);
            const [selectedStock, setSelectedStock] = useState(null);
            const [apiKey, setApiKey] = useState('');
            const [showKeyInput, setShowKeyInput] = useState(true);
            const [newSymbol, setNewSymbol] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [currentView, setCurrentView] = useState('dashboard'); 
            const [chartTab, setChartTab] = useState('price'); 
            const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

            // AI 預測引擎與延遲設定
            const [selectedModel, setSelectedModel] = useState('gemini-2.5-flash'); 
            const [updateInterval, setUpdateInterval] = useState(5000); // 預設 5 秒防限流

            // 篩選最愛與排序
            const [onlyFavorites, setOnlyFavorites] = useState(false);
            const [draggedIdx, setDraggedIdx] = useState(null);

            // 備份匯入與匯出控制
            const [showBackupBox, setShowBackupBox] = useState(false);
            const [backupString, setBackupString] = useState('');
            const [importString, setImportString] = useState('');
            const exportTextareaRef = useRef(null);

            // 背景一鍵更新進度追蹤
            const [bulkUpdating, setBulkUpdating] = useState(false);
            const [bulkProgress, setBulkProgress] = useState({
                current: 0,
                total: 0,
                activeName: '',
                statusMap: {} 
            });
            const [showBulkProgressCard, setShowBulkProgressCard] = useState(false);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const cancelBulkRef = useRef(false);

            // ==========================================
            // 🔒 2. 安全初始化與「格式相容自動升級/自動中文字典規範」
            // ==========================================
            const normalizeWatchlist = (list) => {
                return list.map(item => {
                    const sym = item.symbol.toUpperCase();
                    // 如果名稱不存在，或名稱等於代號，則自動使用字典修正
                    let correctName = item.name;
                    if (!correctName || correctName === item.symbol) {
                        correctName = STOCK_DICTIONARY[sym] || item.symbol;
                    }
                    return {
                        ...item,
                        name: correctName,
                        isFavorite: item.isFavorite !== undefined ? item.isFavorite : false,
                        predictionHistory: item.predictionHistory || {},
                        latestData: item.latestData || null
                    };
                });
            };

            useEffect(() => {
                const localList = localStorage.getItem('alphapredict_watchlist_v5_3');
                const localKey = localStorage.getItem('gemini_api_key');
                const localModel = localStorage.getItem('gemini_selected_model');
                const localInterval = localStorage.getItem('gemini_update_interval');
                
                let initialWatchlist = DEFAULT_WATCHLIST;

                if (localList) {
                    try {
                        const parsed = JSON.parse(localList);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            initialWatchlist = normalizeWatchlist(parsed);
                        }
                    } catch (e) {
                        initialWatchlist = DEFAULT_WATCHLIST;
                    }
                }
                
                setWatchlist(initialWatchlist);
                localStorage.setItem('alphapredict_watchlist_v5_3', JSON.stringify(initialWatchlist));

                if (localKey) {
                    setApiKey(localKey);
                    setShowKeyInput(false);
                }
                if (localModel) {
                    setSelectedModel(localModel);
                }
                if (localInterval) {
                    setUpdateInterval(parseInt(localInterval));
                }

                if (!useFirebase) {
                    setCloudSyncing(false);
                    // 【自動續傳】在非雲端模式下，網頁重新整理時自動檢查並恢復未完成更新
                    setTimeout(() => {
                        checkAndResumePendingQueue();
                    }, 1000);
                    return;
                }

                const initAuth = async () => {
                    setCloudSyncing(true);
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("[雲端防崩潰] 降級為獨立本機運行模式:", err);
                        setCloudSyncing(false);
                    }
                };
                initAuth();
                
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                });
                return () => unsubscribe();
            }, []);

            // ==========================================
            // 📡 3. 雲端即時同步資料與「自動續傳檢測」
            // ==========================================
            useEffect(() => {
                if (!useFirebase || !user) return; 

                setCloudSyncing(true);
                const docRef = db.doc(`artifacts/${appId}/users/${user.uid}/watchlist/user_list_v5_3`);
                
                const unsubscribe = docRef.onSnapshot(
                    (docSnap) => {
                        if (docSnap.exists) {
                            const cloudData = docSnap.data();
                            
                            if (cloudData.list) {
                                const upgradedList = normalizeWatchlist(cloudData.list);
                                setWatchlist(upgradedList);
                                localStorage.setItem('alphapredict_watchlist_v5_3', JSON.stringify(upgradedList));

                                if (selectedStock) {
                                    const freshStock = upgradedList.find(s => s.symbol === selectedStock.symbol);
                                    if (freshStock) {
                                        setSelectedStock(freshStock);
                                    }
                                }
                            }
                            if (cloudData.apiKey !== undefined) {
                                setApiKey(cloudData.apiKey);
                                localStorage.setItem('gemini_api_key', cloudData.apiKey);
                                setShowKeyInput(!cloudData.apiKey.trim());
                            }
                            if (cloudData.selectedModel !== undefined) {
                                setSelectedModel(cloudData.selectedModel);
                                localStorage.setItem('gemini_selected_model', cloudData.selectedModel);
                            }
                            if (cloudData.updateInterval !== undefined) {
                                setUpdateInterval(cloudData.updateInterval);
                                localStorage.setItem('gemini_update_interval', String(cloudData.updateInterval));
                            }
                        } else {
                            const currentList = JSON.parse(localStorage.getItem('alphapredict_watchlist_v5_3')) || DEFAULT_WATCHLIST;
                            const currentKey = localStorage.getItem('gemini_api_key') || '';
                            const currentModel = localStorage.getItem('gemini_selected_model') || 'gemini-2.5-flash';
                            const currentInterval = parseInt(localStorage.getItem('gemini_update_interval') || '5000');
                            docRef.set({
                                list: currentList,
                                apiKey: currentKey,
                                selectedModel: currentModel,
                                updateInterval: currentInterval
                            });
                        }
                        setCloudSyncing(false);

                        // 雲端同步完成後，自動檢查續傳
                        setTimeout(() => {
                            checkAndResumePendingQueue();
                        }, 500);
                    },
                    (err) => {
                        console.error("[雲端監聽錯誤] 維持本機資料顯示:", err);
                        setCloudSyncing(false);
                    }
                );

                return () => unsubscribe();
            }, [user, selectedStock?.symbol]);

            // ==========================================
            // 💾 4. 智慧儲存機制
            // ==========================================
            const saveData = async (newList, newKey, newModel = selectedModel, newInterval = updateInterval) => {
                localStorage.setItem('alphapredict_watchlist_v5_3', JSON.stringify(newList));
                localStorage.setItem('gemini_api_key', newKey);
                localStorage.setItem('gemini_selected_model', newModel);
                localStorage.setItem('gemini_update_interval', String(newInterval));

                if (useFirebase && user) {
                    setCloudSyncing(true);
                    try {
                        const docRef = db.doc(`artifacts/${appId}/users/${user.uid}/watchlist/user_list_v5_3`);
                        await docRef.set({
                            list: newList,
                            apiKey: newKey,
                            selectedModel: newModel,
                            updateInterval: newInterval
                        });
                        setCloudSyncing(false);
                    } catch (err) {
                        console.error("[雲端同步失敗] 已將資料安全保留在手機本機:", err);
                        setCloudSyncing(false);
                    }
                }
            };

            // 彈出提示訊息
            const triggerToast = (message, type = 'info') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
            };

            // 儲存金鑰與設定
            const handleSaveApiKey = (e) => {
                e.preventDefault();
                if (!apiKey.trim()) {
                    triggerToast('請輸入有效的 Gemini API Key', 'error');
                    return;
                }
                saveData(watchlist, apiKey.trim());
                setShowKeyInput(false);
                triggerToast('設定已安全儲存！', 'success');
            };

            // 清除金鑰
            const handleClearApiKey = () => {
                saveData(watchlist, '');
                setApiKey('');
                setShowKeyInput(true);
                triggerToast('金鑰已安全清除', 'info');
            };

            // 調整模型選擇
            const handleModelChange = (e) => {
                const model = e.target.value;
                setSelectedModel(model);
                saveData(watchlist, apiKey, model, updateInterval);
                triggerToast(`已切換模型為 ${model}`, 'success');
            };

            // 調整更新間隔
            const handleIntervalChange = (e) => {
                const interval = parseInt(e.target.value);
                setUpdateInterval(interval);
                saveData(watchlist, apiKey, selectedModel, interval);
                triggerToast(`更新延遲已設定為 ${interval / 1000} 秒`, 'success');
            };

            // 新增觀察股票 (支援批量輸入 + 字典秒查名稱)
            const handleAddStock = (e) => {
                e.preventDefault();
                const input = newSymbol.trim();
                if (!input) return;

                const symbols = input.split(/[,\s;，；]+/).map(s => s.trim().toUpperCase()).filter(s => s.length > 0);
                
                if (symbols.length === 0) {
                    triggerToast('請輸入有效的代號！', 'error');
                    return;
                }

                setWatchlist(prev => {
                    let updated = [...prev];
                    let addedCount = 0;

                    symbols.forEach(sym => {
                        if (!updated.some(s => s.symbol === sym)) {
                            // 優先從字典獲取漂亮的中文/英文名字，免等待 AI 更新
                            const prefilledName = STOCK_DICTIONARY[sym] || sym;
                            updated.push({
                                symbol: sym,
                                name: prefilledName, 
                                isFavorite: false,
                                predictionHistory: {},
                                latestData: null
                            });
                            addedCount++;
                        }
                    });

                    if (addedCount > 0) {
                        saveData(updated, apiKey);
                        triggerToast(`成功新增 ${addedCount} 檔股票！`, 'success');
                    } else {
                        triggerToast('輸入的股票皆已在清單中。', 'info');
                    }
                    return updated;
                });
                setNewSymbol('');
            };

            // 刪除觀察股票
            const handleRemoveStock = (sym, e) => {
                e.stopPropagation(); 
                setWatchlist(prev => {
                    const updated = prev.filter(s => s.symbol !== sym);
                    saveData(updated, apiKey);
                    return updated;
                });
                if (selectedStock && selectedStock.symbol === sym) {
                    setSelectedStock(null);
                    setCurrentView('dashboard');
                }
                triggerToast('已成功移除標的', 'info');
            };

            // 切換我的最愛標記
            const handleToggleFavorite = (sym, e) => {
                e.stopPropagation();
                setWatchlist(prev => {
                    const updated = prev.map(s => {
                        if (s.symbol === sym) {
                            const newFav = !s.isFavorite;
                            triggerToast(newFav ? `已將 ${s.symbol} 加入最愛 ⭐` : `已取消 ${s.symbol} 最愛`, 'success');
                            return { ...s, isFavorite: newFav };
                        }
                        return s;
                    });
                    saveData(updated, apiKey);
                    return updated;
                });
            };

            // 📁 數據備份與還原
            const handleExportData = () => {
                const packageData = {
                    apiKey: apiKey,
                    watchlist: watchlist
                };
                const base64Str = btoa(encodeURIComponent(JSON.stringify(packageData)));
                setBackupString(base64Str);
                triggerToast('備份代碼已產生！請複製下方框內文字。', 'success');
            };

            const handleCopyBackup = () => {
                if (exportTextareaRef.current) {
                    exportTextareaRef.current.select();
                    document.execCommand('copy');
                    triggerToast('已複製備份代碼！', 'success');
                }
            };

            const handleImportData = () => {
                if (!importString.trim()) {
                    triggerToast('請先貼入備份代碼！', 'error');
                    return;
                }
                try {
                    const decoded = JSON.parse(decodeURIComponent(atob(importString.trim())));
                    if (decoded && Array.isArray(decoded.watchlist)) {
                        const upgraded = normalizeWatchlist(decoded.watchlist);
                        setWatchlist(upgraded);
                        setApiKey(decoded.apiKey || '');
                        setShowKeyInput(!(decoded.apiKey || '').trim());
                        saveData(upgraded, decoded.apiKey || '');
                        setImportString('');
                        setShowBackupBox(false);
                        triggerToast('🎉 數據與歷史紀錄已同步完畢！', 'success');
                    } else {
                        throw new Error();
                    }
                } catch (e) {
                    triggerToast('匯入失敗！請確認代碼是否完整、無多餘空白。', 'error');
                }
            };

            // 拖曳與排序
            const handleDragStart = (e, index) => {
                setDraggedIdx(index);
                e.dataTransfer.effectAllowed = 'move';
            };

            const handleDragOver = (e, index) => {
                e.preventDefault();
                if (draggedIdx === null || draggedIdx === index) return;
                
                const newList = [...watchlist];
                const draggedItem = newList[draggedIdx];
                newList.splice(draggedIdx, 1);
                newList.splice(index, 0, draggedItem);
                
                setDraggedIdx(index);
                setWatchlist(newList);
            };

            const handleDragEnd = () => {
                setDraggedIdx(null);
                saveData(watchlist, apiKey);
                triggerToast('自訂清單排序已儲存！', 'success');
            };

            // 向上排序
            const moveUp = (index, e) => {
                e.stopPropagation();
                if (index === 0) return;
                const newList = [...watchlist];
                const temp = newList[index];
                newList[index] = newList[index - 1];
                newList[index - 1] = temp;
                setWatchlist(newList);
                saveData(newList, apiKey);
                triggerToast('已向上排序', 'info');
            };

            // 向下排序
            const moveDown = (index, e) => {
                e.stopPropagation();
                if (index === watchlist.length - 1) return;
                const newList = [...watchlist];
                const temp = newList[index];
                newList[index] = newList[index + 1];
                newList[index + 1] = temp;
                setWatchlist(newList);
                saveData(newList, apiKey);
                triggerToast('已向下排序', 'info');
            };

            // 計算勝率
            const calculateHitRate = (stock) => {
                const history = stock.predictionHistory || {};
                const keys = Object.keys(history);
                const evaluatedKeys = keys.filter(k => history[k].isCorrect !== undefined);
                if (evaluatedKeys.length === 0) return { rate: '-', total: 0 };
                
                const correctCount = evaluatedKeys.filter(k => history[k].isCorrect === true).length;
                const rate = Math.round((correctCount / evaluatedKeys.length) * 100);
                return { rate: `${rate}%`, total: evaluatedKeys.length };
            };

            // 繪製詳細圖表
            useEffect(() => {
                if (currentView === 'detail' && selectedStock?.latestData?.historicalPrices && chartRef.current) {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                    const ctx = chartRef.current.getContext('2d');
                    
                    const sortedPrices = [...selectedStock.latestData.historicalPrices].sort((a, b) => new Date(a.date) - new Date(b.date));
                    const history = selectedStock.predictionHistory || {};

                    if (chartTab === 'price') {
                        chartInstance.current = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: sortedPrices.map(d => d.date.slice(5)),
                                datasets: [{
                                    data: sortedPrices.map(d => d.price),
                                    borderColor: '#38bdf8',
                                    backgroundColor: 'rgba(56, 189, 248, 0.04)',
                                    borderWidth: 2,
                                    tension: 0.3,
                                    pointRadius: 4,
                                    pointHoverRadius: 6,
                                    pointBackgroundColor: '#38bdf8',
                                    pointBorderColor: '#0b0f19',
                                    pointBorderWidth: 1.5,
                                    fill: true
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: { legend: { display: false } },
                                scales: {
                                    x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 } } },
                                    y: { grid: { color: '#111827' }, ticks: { color: '#64748b', font: { size: 10 } } }
                                }
                            }
                        });
                    } else {
                        const pointColors = [];
                        const pointRadii = [];
                        const pointHoverRadii = [];
                        const pointLabel = [];

                        sortedPrices.forEach(d => {
                            const predRecord = history[d.date];
                            if (predRecord && predRecord.isCorrect !== undefined) {
                                if (predRecord.isCorrect === true) {
                                    pointColors.push('#10b981'); 
                                    pointRadii.push(7);
                                    pointHoverRadii.push(9);
                                    pointLabel.push(`預估：${predRecord.yesterdayPrediction} (正確 ✅)`);
                                } else {
                                    pointColors.push('#f43f5e'); 
                                    pointRadii.push(7);
                                    pointHoverRadii.push(9);
                                    pointLabel.push(`預估：${predRecord.yesterdayPrediction} (錯誤 ❌)`);
                                }
                            } else {
                                pointColors.push('#64748b'); 
                                pointRadii.push(3);
                                pointHoverRadii.push(5);
                                pointLabel.push('無當日預測紀錄');
                            }
                        });

                        chartInstance.current = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: sortedPrices.map(d => d.date.slice(5)),
                                datasets: [{
                                    data: sortedPrices.map(d => d.price),
                                    borderColor: '#4b5563',
                                    backgroundColor: 'rgba(75, 85, 99, 0.02)',
                                    borderWidth: 2,
                                    tension: 0.1,
                                    pointRadius: pointRadii,
                                    pointHoverRadius: pointHoverRadii,
                                    pointBackgroundColor: pointColors,
                                    pointBorderColor: '#030712',
                                    pointBorderWidth: 2,
                                    fill: true
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: { display: false },
                                    tooltip: {
                                        backgroundColor: '#0f172a',
                                        titleColor: '#94a3b8',
                                        bodyColor: '#f8fafc',
                                        borderColor: '#334155',
                                        borderWidth: 1,
                                        padding: 10,
                                        displayColors: false,
                                        callbacks: {
                                            label: function(context) {
                                                const price = context.parsed.y;
                                                const idx = context.dataIndex;
                                                return [
                                                    `收盤價: $${price}`,
                                                    `${pointLabel[idx]}`
                                                ];
                                            }
                                        }
                                    }
                                },
                                scales: {
                                    x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 } } },
                                    y: { grid: { color: '#111827' }, ticks: { color: '#64748b', font: { size: 10 } } }
                                }
                            }
                        });
                    }
                }
            }, [currentView, selectedStock, chartTab]);

            // 智慧過濾 JSON 提取器
            const cleanAndExtractJson = (text) => {
                let temp = text.trim();
                temp = temp.replace(/^```[a-zA-Z]*/, '');
                temp = temp.replace(/```$/, '');
                temp = temp.trim();

                const firstBrace = temp.indexOf('{');
                const lastBrace = temp.lastIndexOf('}');
                if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
                    return temp.substring(firstBrace, lastBrace + 1).trim();
                }
                return temp;
            };

            // 執行 Fetch 連線
            const executeFetch = async (stockItem, currentKey, modelName) => {
                const todayStr = new Date().toISOString().split('T')[0];
                const ticks = String.fromCharCode(96) + String.fromCharCode(96) + String.fromCharCode(96);

                const prompt = "你是一位精通全球股市與量化交易的首席分析師。請針對金融標的「" + stockItem.symbol + "」進行預測。" +
                  "請利用你的 Google 搜尋功能 (Google Search Grounding)，在網路上實時檢索並彙整以下資訊：" +
                  "1. 該標的今天的最新成交價格、今日的 前日收盤價 (昨日收盤價 yesterdayClose)。" +
                  "2. 今日最高價 (todayHigh)、今日最低價 (todayLow)、今日成交總量 (totalVolume)。" +
                  "3. 該股票今天的「大單交易明細 (marketTrades)」，包含 4~5 筆具代表性的大單，每筆資料需有成交時間(time)、成交價格(price)、成交量(quantity)、以及交易屬性類型(type，買入或賣出)。" +
                  "4. 今日買方力道佔比 (buyRatio，主動買單/外盤，1~100 的整數) 與賣方力道佔比 (sellRatio，主動賣單/內盤，1~100 的整數)。" +
                  "5. 該標的最近 7 至 10 個交易日的歷史收盤價序列（格式為 YYYY-MM-DD，請找出對應的真實價格，用來繪製圖表）。" +
                  "6. 明天（下一個交易日）的走勢預測。" +
                  "請絕對只返回一個標準的 JSON 格式內容（可以用 " + ticks + "json 包裝），除此之外不要有任何前後說明引言。" +
                  "JSON 結構必須完全符合以下欄位設定，且其中的 name 請務必精確填入公司的 [英文官方名稱] 加上 [中文簡稱]（例如：'Microsoft 微軟'、'NVIDIA 輝達'、'國泰費城半導體'），而 historicalPrices 請務必填入你搜尋到的真實歷史價格：" +
                  "{" +
                    '"symbol": "' + stockItem.symbol + '",' +
                    '"name": "必須為該公司的 英文官方名稱 中文官方簡稱（如: Microsoft 微軟）",' +
                    '"currentPrice": 最新價格(數字),' +
                    '"yesterdayClose": 前日收盤價格(數字),' +
                    '"todayHigh": 今日最高價(數字),' +
                    '"todayLow": 今日最低價(數字),' +
                    '"totalVolume": "今日成交總量字串(例如 \'35,420 張\' 或 \'45.2M 股\')",' +
                    '"buyRatio": 今日買盤外盤佔比整數(例如 52),' +
                    '"sellRatio": 今日賣盤內盤佔比整數(例如 48),' +
                    '"marketTrades": [' +
                      '{"time": "13:25:30", "price": 912, "quantity": "350張", "type": "買入"},' +
                      '{"time": "13:18:12", "price": 911, "quantity": "120張", "type": "賣出"}' +
                    '],' +
                    '"todayActual": "今日實際結果走勢，必須填入 \'漲\' 或 \'跌\' 或 \'平\'",' +
                    '"todayChangePercent": "今日實際漲跌幅百分比字串，例如 \'+1.52%\' 或 \'-0.8%\'",' +
                    '"prediction": "預測明日結果走勢，必須填入 \'漲\' 或 \'跌\' 或 \'盤整\'",' +
                    '"upProbability": 漲的機率百分比(整數，例如 65),' +
                    '"downProbability": 跌的機率百分比(整數，例如 35),' +
                    '"targetRange": "預測隔日波動區間，例如 152.0 ~ 155.5",' +
                    '"historicalPrices": [' +
                      '{"date": "2026-05-20", "price": 150.2},' +
                      '{"date": "2026-05-21", "price": 151.0}' +
                    '],' +
                    '"analysis": "結合技術面（歷史趨勢）與今日網路最新消息（基本面）的綜合分析報告（繁體中文，約 200 字）。"' +
                  "}";

                const apiEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${currentKey.trim()}`;
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    tools: [{ google_search: {} }]
                };

                const retryDelays = [1000, 2000, 4000, 8000, 16000];
                const executeWithRetry = async (attempt = 0) => {
                    try {
                        const response = await fetch(apiEndpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            const errData = await response.json().catch(() => ({}));
                            const statusText = response.status === 429 ? "Quota Exceeded (15 RPM Limit ⚠️)" : (errData.error?.message || `HTTP ${response.status}`);
                            
                            if ((response.status === 429 || response.status >= 500) && attempt < retryDelays.length) {
                                await new Promise(resolve => setTimeout(resolve, retryDelays[attempt]));
                                return executeWithRetry(attempt + 1);
                            }
                            throw new Error(statusText);
                        }
                        return await response.json();
                    } catch (err) {
                        if (attempt < retryDelays.length) {
                            await new Promise(resolve => setTimeout(resolve, retryDelays[attempt]));
                            return executeWithRetry(attempt + 1);
                        }
                        throw err;
                    }
                };

                const result = await executeWithRetry();
                const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!rawText) {
                    throw new Error('AI 未能成功產出數據');
                }

                const cleanedJson = cleanAndExtractJson(rawText);
                return JSON.parse(cleanedJson);
            };

            // ==========================================
            // 🛡️ 5. 【核心修正】智慧環境雙規切換 ＆ 雙模型自動降級
            // ==========================================
            const fetchSingleStockUpdate = async (stockItem, currentKey) => {
                // 智慧環境偵測：如果運行在我們平台的編輯器 (Iframe) 中，強制使用規定的唯一預覽模型
                const isPlatformSandbox = typeof __app_id !== 'undefined' || window.location.hostname.includes('localhost') || !window.location.hostname.includes('github.io');
                const targetModel = isPlatformSandbox ? 'gemini-2.5-flash-preview-09-2025' : selectedModel;

                try {
                    // 1. 優先試用目標模型
                    return await executeFetch(stockItem, currentKey, targetModel);
                } catch (err) {
                    // 2. 如果選用的是 2.5 且出錯，在 GitHub Pages 模式下無痛切換至穩定的 1.5 flash 重新嘗試
                    if (!isPlatformSandbox && targetModel !== 'gemini-1.5-flash') {
                        console.warn(`[自動降級] 模型 ${targetModel} 失敗。正在自動使用穩定版 gemini-1.5-flash 重新更新...`);
                        return await executeFetch(stockItem, currentKey, 'gemini-1.5-flash');
                    }
                    throw err;
                }
            };

            // 防競態狀態更新
            const applyStockUpdateToState = (targetSymbol, parsedResult) => {
                const todayStr = new Date().toISOString().split('T')[0];

                setWatchlist(prev => {
                    const freshStock = prev.find(s => s.symbol === targetSymbol);
                    if (!freshStock) return prev; 

                    let yesterdayPrediction = '-';
                    if (freshStock.latestData?.prediction) {
                        yesterdayPrediction = freshStock.latestData.prediction;
                    }

                    let isCorrect = undefined;
                    if (yesterdayPrediction !== '-') {
                        const actual = parsedResult.todayActual; 
                        if (actual === '平') {
                            isCorrect = true; 
                        } else {
                            isCorrect = (yesterdayPrediction === actual);
                        }
                    }

                    const updatedStock = {
                        ...freshStock, 
                        name: parsedResult.name || freshStock.name,
                        latestData: parsedResult,
                        predictionHistory: {
                            ...freshStock.predictionHistory,
                            [todayStr]: {
                                yesterdayPrediction: yesterdayPrediction,
                                todayActual: parsedResult.todayActual + " (" + parsedResult.todayChangePercent + ")",
                                tomorrowPrediction: parsedResult.prediction + " (" + parsedResult.upProbability + "%)",
                                isCorrect: isCorrect, 
                                rawData: parsedResult
                            }
                        }
                    };

                    const updatedList = prev.map(s => s.symbol === targetSymbol ? updatedStock : s);
                    saveData(updatedList, apiKey);

                    if (selectedStock && selectedStock.symbol === targetSymbol) {
                        setSelectedStock(updatedStock);
                    }

                    return updatedList;
                });
            };

            // 手動單股更新
            const handleUpdateStock = async (stockItem) => {
                if (!apiKey.trim()) {
                    triggerToast('請先設定您的 Gemini API Key！', 'error');
                    setShowKeyInput(true);
                    return;
                }

                setLoading(true);
                setError('');

                try {
                    const parsedResult = await fetchSingleStockUpdate(stockItem, apiKey);
                    applyStockUpdateToState(stockItem.symbol, parsedResult);
                    triggerToast(`${stockItem.symbol} 更新成功！`, 'success');
                } catch (err) {
                    console.error('更新失敗:', err);
                    setError(`${stockItem.symbol}: ${err.message}`);
                    triggerToast('分析更新失敗', 'error');
                } finally {
                    setLoading(false);
                }
            };

            // ==========================================
            // 🔄 6. 【黑科技】背景一鍵更新（自訂延遲 ＆ 自動中斷續傳記憶）
            // ==========================================
            const handleUpdateAllWatchlist = async () => {
                if (!apiKey.trim()) {
                    triggerToast('請先設定您的 Gemini API Key！', 'error');
                    setShowKeyInput(true);
                    return;
                }

                const targetList = onlyFavorites ? watchlist.filter(s => s.isFavorite) : watchlist;

                if (targetList.length === 0) {
                    triggerToast('目前沒有可更新的股票！', 'error');
                    return;
                }

                // 1. 將欲更新的股票代碼存入「未完成排隊 Local 佇列」，防手動刷新遺失
                const pendingSymbols = targetList.map(s => s.symbol);
                localStorage.setItem('alphapredict_pending_queue', JSON.stringify(pendingSymbols));

                await startBulkUpdateProcess(targetList);
            };

            // 背景更新主迴圈
            const startBulkUpdateProcess = async (targetList) => {
                cancelBulkRef.current = false;
                setBulkUpdating(true);
                setShowBulkProgressCard(true); 
                setError('');
                
                const initialStatusMap = {};
                targetList.forEach(s => {
                    initialStatusMap[s.symbol] = { status: 'waiting' };
                });

                setBulkProgress({
                    current: 0,
                    total: targetList.length,
                    activeName: targetList[0].name,
                    statusMap: initialStatusMap
                });

                for (let i = 0; i < targetList.length; i++) {
                    if (cancelBulkRef.current) {
                        triggerToast('背景更新已取消！已更新資料已安全存檔。', 'info');
                        localStorage.removeItem('alphapredict_pending_queue');
                        break;
                    }

                    const currentStock = targetList[i];

                    setBulkProgress(prev => ({
                        ...prev,
                        current: i + 1,
                        activeName: currentStock.name,
                        statusMap: { 
                            ...prev.statusMap, 
                            [currentStock.symbol]: { status: 'updating' } 
                        }
                    }));

                    try {
                        const parsedResult = await fetchSingleStockUpdate(currentStock, apiKey);
                        applyStockUpdateToState(currentStock.symbol, parsedResult);

                        setBulkProgress(prev => ({
                            ...prev,
                            statusMap: { 
                                ...prev.statusMap, 
                                [currentStock.symbol]: { status: 'success' } 
                            }
                        }));

                    } catch (err) {
                        console.error(`更新 ${currentStock.symbol} 失敗:`, err);
                        setBulkProgress(prev => ({
                            ...prev,
                            statusMap: { 
                                ...prev.statusMap, 
                                [currentStock.symbol]: { status: 'failed', message: err.message } 
                            }
                        }));
                    }

                    // 更新 Local 剩餘佇列 (安全續傳)
                    try {
                        const savedQueue = JSON.parse(localStorage.getItem('alphapredict_pending_queue') || '[]');
                        const nextQueue = savedQueue.filter(sym => sym !== currentStock.symbol);
                        if (nextQueue.length > 0) {
                            localStorage.setItem('alphapredict_pending_queue', JSON.stringify(nextQueue));
                        } else {
                            localStorage.removeItem('alphapredict_pending_queue');
                        }
                    } catch (e) {}

                    // 自訂智慧延遲間隔
                    if (i < targetList.length - 1 && !cancelBulkRef.current) {
                        await new Promise(resolve => setTimeout(resolve, updateInterval));
                    }
                }

                setBulkUpdating(false);
                setTimeout(() => {
                    setShowBulkProgressCard(false);
                }, 4000);
            };

            // 檢查並恢復未完成更新
            const checkAndResumePendingQueue = () => {
                const savedQueueStr = localStorage.getItem('alphapredict_pending_queue');
                if (!savedQueueStr) return;

                try {
                    const savedQueue = JSON.parse(savedQueueStr);
                    if (Array.isArray(savedQueue) && savedQueue.length > 0) {
                        // 尋找 watchlist 中對應的剩餘對象
                        const remainingStocks = watchlist.filter(s => savedQueue.includes(s.symbol));
                        if (remainingStocks.length > 0) {
                            triggerToast("⚡ 偵測到未完成更新！正在自動恢復背景更新排程...", "info");
                            startBulkUpdateProcess(remainingStocks);
                        }
                    }
                } catch (e) {
                    localStorage.removeItem('alphapredict_pending_queue');
                }
            };

            const getDisplayData = (stock) => {
                const todayStr = new Date().toISOString().split('T')[0];
                const historyData = stock.predictionHistory?.[todayStr];

                return {
                    yesterdayPred: historyData?.yesterdayPrediction || stock.latestData?.yesterdayPrediction || '-',
                    todayAct: historyData?.todayActual || (stock.latestData ? `${stock.latestData.todayActual} (${stock.latestData.todayChangePercent})` : '-'),
                    tomorrowPred: historyData?.tomorrowPrediction || (stock.latestData ? `${stock.latestData.prediction} (${stock.latestData.upProbability}%)` : '-')
                };
            };

            const filteredWatchlist = onlyFavorites ? watchlist.filter(s => s.isFavorite) : watchlist;

            return (
                <div class="max-w-md mx-auto p-4 space-y-5">
                    {/* Header */}
                    <header class="text-center my-2 relative">
                        {/* 雲端狀態 */}
                        <div class="absolute top-0 right-0 text-[10px] bg-slate-900/60 border border-slate-800 rounded-full px-2 py-0.5 flex items-center gap-1">
                            {useFirebase ? (
                                cloudSyncing ? (
                                    <span class="flex items-center gap-1 text-sky-400">
                                        <span class="inline-block h-1.5 w-1.5 rounded-full bg-sky-400 animate-ping"></span>
                                        雲端同步中...
                                    </span>
                                ) : (
                                    <span class="flex items-center gap-1 text-emerald-400 font-medium">
                                        ☁️ 已同步
                                    </span>
                                )
                            ) : (
                                <span class="flex items-center gap-1 text-slate-400 font-medium" title="本地安全存檔，重整、版本更迭均不丟失！">
                                    💾 本地持久儲存
                                </span>
                            )}
                        </div>

                        <div class="inline-flex items-center justify-center w-11 h-11 rounded-2xl bg-sky-500/10 text-sky-400 text-2xl mb-1 shadow-inner">
                            🔮
                        </div>
                        <h1 class="text-xl font-bold tracking-wide bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">
                            AlphaPredict 智股預測家
                        </h1>
                        <p class="text-[9px] text-slate-500 tracking-wider uppercase font-medium">Hybrid Cloud-Synced AI Predictor</p>
                    </header>

                    {/* API Key 與 AI 量化引擎設定區塊 */}
                    <div class="bg-slate-900/80 border border-slate-800 rounded-2xl p-4 shadow-xl font-medium space-y-3">
                        <div class="flex justify-between items-center">
                            <h2 class="text-xs font-bold text-slate-400 flex items-center gap-1.5">
                                <span class="text-sky-400">🔑</span> Gemini API 與引擎設定
                            </h2>
                            {!showKeyInput && (
                                <button 
                                    onClick={() => setShowKeyInput(true)} 
                                    class="text-[10px] text-sky-400 hover:text-sky-300 font-medium cursor-pointer"
                                >
                                    修改設定
                                </button>
                            )}
                        </div>

                        {showKeyInput ? (
                            <form onSubmit={handleSaveApiKey} class="space-y-3">
                                <div class="flex gap-2">
                                    <input 
                                        type="password" 
                                        placeholder="輸入 AIzaSy... 開頭的 API Key" 
                                        value={apiKey}
                                        onChange={(e) => setApiKey(e.target.value)}
                                        class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-xs text-slate-200 focus:outline-none focus:border-sky-500 placeholder-slate-700 font-mono"
                                    />
                                    <button 
                                        type="submit" 
                                        class="bg-sky-500 hover:bg-sky-600 text-white font-semibold px-4 py-2.5 rounded-xl text-xs transition-all cursor-pointer"
                                    >
                                        儲存
                                    </button>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-850">
                                    <div>
                                        <label class="block text-[10px] text-slate-500 mb-1">AI 預測引擎 (獨立模式)</label>
                                        <select 
                                            value={selectedModel}
                                            onChange={handleModelChange}
                                            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-2.5 py-2 text-[11px] text-slate-300 focus:outline-none cursor-pointer"
                                        >
                                            <option value="gemini-2.5-flash">Gemini 2.5 Flash (推薦穩定)</option>
                                            <option value="gemini-1.5-flash">Gemini 1.5 Flash (極速輕量)</option>
                                            <option value="gemini-1.5-pro">Gemini 1.5 Pro (深度分析)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-[10px] text-slate-500 mb-1">智慧更新延遲間隔</label>
                                        <select 
                                            value={updateInterval}
                                            onChange={handleIntervalChange}
                                            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-2.5 py-2 text-[11px] text-slate-300 focus:outline-none cursor-pointer"
                                        >
                                            <option value="3000">3.0 秒 (少於5檔標的)</option>
                                            <option value="5000">5.0 秒 (防 429 報錯推薦)</option>
                                            <option value="7000">7.0 秒 (超過15檔標的)</option>
                                            <option value="10000">10.0 秒 (高防護安全模式)</option>
                                        </select>
                                    </div>
                                </div>
                            </form>
                        ) : (
                            <div class="space-y-2">
                                <div class="flex justify-between items-center bg-slate-950/40 border border-slate-850 rounded-xl px-3.5 py-2.5 text-xs">
                                    <span class="font-mono text-slate-500 font-medium">已安全儲存金鑰 (••••••••••••)</span>
                                    <button 
                                        type="button" 
                                        onClick={handleClearApiKey}
                                        class="text-[10px] text-red-400 hover:text-red-300 font-medium cursor-pointer"
                                    >
                                        清除
                                    </button>
                                </div>
                                <div class="flex justify-between text-[10px] text-slate-500 px-1 font-semibold">
                                    <span>引擎：<strong class="text-slate-400">{selectedModel}</strong></span>
                                    <span>智慧間隔：<strong class="text-slate-400">{updateInterval / 1000} 秒</strong></span>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 主畫面：儀表板與觀察名單 */}
                    {currentView === 'dashboard' && (
                        <div class="space-y-4">
                            {/* 新增股票 (支援批量輸入) 與一鍵更新 */}
                            <div class="flex flex-col gap-3">
                                <form onSubmit={handleAddStock} class="bg-slate-900/60 border border-slate-800 p-3 rounded-2xl flex gap-2 items-center flex-1">
                                    <input 
                                        type="text" 
                                        placeholder="批次新增: NVDA, AAPL, 2330.TW" 
                                        value={newSymbol}
                                        onChange={(e) => setNewSymbol(e.target.value)}
                                        class="flex-1 bg-transparent px-3 py-2 text-xs text-slate-200 focus:outline-none placeholder-slate-600 uppercase font-bold"
                                    />
                                    <button 
                                        type="submit" 
                                        class="bg-indigo-600/80 hover:bg-indigo-600 text-white font-bold px-4 py-2 rounded-xl text-xs transition-all flex items-center gap-1 cursor-pointer whitespace-nowrap"
                                    >
                                        <span>➕</span> 批量新增
                                    </button>
                                </form>

                                <div class="flex gap-2">
                                    {/* 篩選最愛切換鍵 */}
                                    <button 
                                        onClick={() => {
                                            setOnlyFavorites(!onlyFavorites);
                                            triggerToast(!onlyFavorites ? "篩選：只看我的最愛 ⭐" : "顯示所有觀察股票 📋", 'info');
                                        }}

                            {/* 4. 基本面：AI 量化分析報告 */}
                            {selectedStock.latestData ? (
                                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl space-y-3">
                                    <h3 class="text-xs font-bold text-sky-400 flex items-center gap-1.5">
                                        <span>📋</span> 聯網綜合量化報告
                                    </h3>
                                    <p class="text-xs text-slate-300 leading-relaxed text-justify">
                                        {selectedStock.latestData.analysis}
                                    </p>
                                </div>
                            ) : (
                                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 text-center space-y-4">
                                    <div class="text-4xl">🔮</div>
                                    <h3 class="text-sm font-bold text-slate-300">目前尚無預測資料</h3>
                                    <p class="text-xs text-slate-500 max-w-xs mx-auto">請在觀察清單中點擊 🔄 刷新按鈕，讓 Gemini 實時抓取價格並生成量化分析預報！</p>
                                    <button 
                                        onClick={() => handleUpdateStock(selectedStock)}
                                        disabled={loading}
                                        class="mx-auto bg-sky-500 hover:bg-sky-600 disabled:bg-slate-800 text-white font-bold px-6 py-2.5 rounded-xl text-xs cursor-pointer flex items-center gap-1.5 active:scale-95 transition-all"
                                    >
                                        {loading ? '分析計算中...' : '🔮 即刻預報'}
                                    </button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* 【進度看板 1】一般單股分析載入遮罩 */}
                    {loading && !bulkUpdating && (
                        <div class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center z-50 animate-fadeIn">
                            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 text-center space-y-4 shadow-2xl max-w-xs w-full mx-4">
                                <div class="relative w-12 h-12 mx-auto flex items-center justify-center">
                                    <span class="absolute inline-block animate-ping rounded-full h-8 w-8 bg-sky-500/30"></span>
                                    <span class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-slate-800 border-t-sky-400"></span>
                                </div>
                                <h3 class="text-sm font-bold text-white">Gemini 聯網分析中...</h3>
                                <p class="text-xs text-slate-500 leading-relaxed">正在網路上 Google 搜尋該股票最新價格、歷史走勢、當日交易大單與昨收數據...</p>
                            </div>
                        </div>
                    )}

                    {/* ==========================================
                        🚀 【背景非阻塞進度看板】精確顯示失敗原因
                        ========================================== */}
                    {showBulkProgressCard && (
                        <div class="fixed bottom-4 right-4 left-4 md:left-auto md:w-80 bg-slate-900 border-2 border-indigo-500/40 rounded-2xl shadow-2xl p-4 z-40 animate-fadeIn space-y-3 font-medium">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-1.5">
                                    <span class="inline-block h-2 w-2 rounded-full bg-indigo-400 animate-ping"></span>
                                    <h4 class="text-xs font-black text-white">背景一鍵更新中</h4>
                                </div>
                                <button 
                                    onClick={() => setShowBulkProgressCard(false)}
                                    class="text-[10px] text-slate-500 hover:text-slate-300 font-bold px-1.5 py-0.5 bg-slate-950/40 rounded"
                                >
                                    隱藏 ✕
                                </button>
                            </div>

                            <div class="space-y-1">
                                <p class="text-[11px] text-slate-400 font-semibold flex justify-between">
                                    <span>正在更新: <strong class="text-slate-200">{bulkProgress.activeName}</strong></span>
                                    <span class="font-mono text-indigo-400">{bulkProgress.current} / {bulkProgress.total}</span>
                                </p>
                                <div class="w-full bg-slate-950 h-2 rounded-full p-[1px] border border-slate-850">
                                    <div 
                                        style={{ width: `${(bulkProgress.current / bulkProgress.total) * 100}%` }} 
                                        class="bg-gradient-to-r from-sky-400 to-indigo-500 h-full rounded-full transition-all duration-300"
                                    ></div>
                                </div>
                            </div>

                            {/* 精簡狀態明細 - 出錯時直接展示報錯文字 */}
                            <div class="max-h-36 overflow-y-auto custom-scrollbar bg-slate-950/40 rounded-xl border border-slate-850 p-2 space-y-1.5 select-none">
                                {watchlist.map((stock) => {
                                    const progressObj = bulkProgress.statusMap[stock.symbol];
                                    if (!progressObj) return null;
                                    return (
                                        <div key={stock.symbol} class="flex justify-between items-start text-[9px] font-semibold py-0.5">
                                            <span class="text-slate-400 truncate max-w-[100px]">{stock.symbol} ({stock.name})</span>
                                            <span class="text-right">
                                                {progressObj.status === 'waiting' && <span class="text-slate-600">等待 ⏳</span>}
                                                {progressObj.status === 'updating' && <span class="text-sky-400 animate-pulse">分析 ⚙️</span>}
                                                {progressObj.status === 'success' && <span class="text-emerald-400">成功 ✅</span>}
                                                {progressObj.status === 'failed' && (
                                                    <span class="text-rose-400 flex flex-col items-end">
                                                        <span>失敗 ❌</span>
                                                        <span class="text-[7.5px] text-rose-500/80 font-normal truncate max-w-[120px]" title={progressObj.message}>
                                                            {progressObj.message || "錯誤"}
                                                        </span>
                                                    </span>
                                                )}
                                            </span>
                                        </div>
                                    );
                                })}
                            </div>

                            {bulkUpdating && (
                                <button 
                                    onClick={() => {
                                        cancelBulkRef.current = true;
                                        triggerToast('正在取消背景任務...', 'info');
                                    }}
                                    class="w-full py-1.5 bg-slate-800 hover:bg-red-950 text-slate-400 hover:text-red-300 font-bold rounded-lg text-[10px] transition-all cursor-pointer"
                                >
                                    🛑 取消更新任務
                                </button>
                            )}
                        </div>
                    )}

                    {bulkUpdating && !showBulkProgressCard && (
                        <button 
                            onClick={() => setShowBulkProgressCard(true)}
                            class="fixed bottom-4 right-4 bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold p-3 rounded-full shadow-2xl z-40 animate-bounce flex items-center gap-1 text-xs cursor-pointer"
                        >
                            🔄 <span>更新中 ({bulkProgress.current}/{bulkProgress.total})</span>
                        </button>
                    )}

                    {/* 錯誤展示 */}
                    {error && (
                        <div class="bg-rose-500/10 border border-rose-500/20 text-rose-400 p-4 rounded-xl text-xs leading-relaxed">
                            ⚠️ {error}
                        </div>
                    )}

                    {/* 自訂 Toast */}
                    {toast.show && (
                        <div class={`fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-3 rounded-xl shadow-2xl text-xs font-medium z-50 flex items-center gap-1.5 border transition-all duration-300 ${
                            toast.type === 'success' ? 'bg-emerald-950/90 text-emerald-300 border-emerald-500/20' :
                            toast.type === 'error' ? 'bg-rose-950/90 text-rose-300 border-rose-500/20' :
                            'bg-slate-900/95 text-slate-300 border-slate-700/50'
                        }`}>
                            <span>{toast.type === 'success' ? '✅' : toast.type === 'error' ? '⚠️' : 'ℹ️'}</span>
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
